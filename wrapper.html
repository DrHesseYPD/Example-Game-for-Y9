<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Game Example</title>

<style>
html, body {
    margin:0;
    padding:0;
    height:100%;
    width:100%;
    background:#000;
}

.game-container {
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
}

.game-frame {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
}
</style>

</head>

<body>

<div class="game-container">
    <iframe 
        src="index.html"
        class="game-frame"
        allowfullscreen>
    </iframe>
</div>

</body>
</html>
